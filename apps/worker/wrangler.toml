name = "hexi-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# For production, set sensitive vars via `wrangler secret put` or environment variables.
# See .env.local.example for the full list of configurable values.
[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "*"
CDN_BASE_URL = "/api/v1/cdn"
MAGIC_LINK_BASE_URL = "https://your-domain.com"
ADMIN_EMAIL = "admin@example.com"
SMTP_HOST = "smtp.example.com"
SMTP_PORT = "587"
SMTP_FROM = "Gallery <noreply@example.com>"
SMTP_USER = "noreply@example.com"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "hexi-db"
database_id = "placeholder-replace-with-real-id"

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "hexi-media"

# SMTP password (set as a secret, not a var):
#   npx wrangler secret put SMTP_PASS

# OAuth secrets (set via `wrangler secret put`):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# GOOGLE_REDIRECT_URI
# APPLE_CLIENT_ID
# APPLE_TEAM_ID
# APPLE_KEY_ID
# APPLE_PRIVATE_KEY
# APPLE_REDIRECT_URI
# DASHBOARD_URL
