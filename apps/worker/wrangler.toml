name = "hexi-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "*"
CDN_BASE_URL = "/api/v1/cdn"
MAGIC_LINK_BASE_URL = "http://localhost:5174"
ADMIN_EMAIL = "admin@example.com"
SMTP_HOST = "smtp.example.com"
SMTP_PORT = "587"
SMTP_FROM = "Gallery <noreply@example.com>"
SMTP_USER = "noreply@example.com"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "hexi-db"
database_id = "placeholder-replace-with-real-id"

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "hexi-media"

# SMTP password (set as a secret, not a var):
#   npx wrangler secret put SMTP_PASS
